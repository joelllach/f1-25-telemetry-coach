# Exposes the UDP telemetry port so the PS5 can reach the container.
#
# Home network / NodePort:
#   The PS5 must point to <node-IP>:30777 (or whatever nodePort you set).
#   Change UDP_PORT in the deployment to match if you change nodePort.
#
# Cloud cluster / LoadBalancer:
#   Change type: NodePort → type: LoadBalancer.
#   The cloud will provision an external IP; point the PS5 there on port 20777.
#
# Bare-metal / hostNetwork:
#   Alternatively, add hostNetwork: true to the pod spec in deployment.yaml
#   and remove this Service — the pod will bind directly to the host's 20777.

apiVersion: v1
kind: Service
metadata:
  name: f1coach-udp
  namespace: f1coach
spec:
  type: NodePort
  selector:
    app: f1coach
  ports:
    - name: telemetry-udp
      protocol: UDP
      port: 20777
      targetPort: 20777
      nodePort: 30777   # reachable at <node-IP>:30777 from the PS5
