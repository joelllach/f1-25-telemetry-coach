# Store your Claude credentials here.
# Edit this file then apply: kubectl apply -f k8s/secret.yaml
#
# For direct Anthropic API:
#   Fill in anthropic-api-key and leave bedrock fields empty.
# For AWS Bedrock:
#   Fill in aws-access-key-id and aws-secret-access-key,
#   set use-bedrock to "1", leave anthropic-api-key empty.
#
# Values must be base64-encoded:
#   echo -n 'sk-ant-...' | base64

apiVersion: v1
kind: Secret
metadata:
  name: f1coach-credentials
  namespace: f1coach
type: Opaque
stringData:
  # Direct Anthropic API — replace with your key or leave blank
  ANTHROPIC_API_KEY: ""

  # AWS Bedrock — fill these if using Bedrock
  CLAUDE_CODE_USE_BEDROCK: ""   # set to "1" to enable Bedrock
  AWS_REGION: "us-west-2"
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
